tags:
  slow:
    description: >-
      Tests that are slow to run (CLI subprocess tests, performance benchmarks).
      Exclude with: dart test --exclude-tags slow
  livewire:
    description: >-
      Livewire-specific tests (wire: attributes, @livewire directives, <livewire:> tags).
      Run with: dart test --tags livewire
  regression:
    description: >-
      Regression and bugfix tests that guard against previously fixed issues.
      Run with: dart test --tags regression
  flux:
    description: >-
      Tests using FluxUI fixture files (parsing and idempotency).
      Run with: dart test --tags flux
  filament:
    description: >-
      Tests using Filament v2/v3/v4 fixture files (parsing and idempotency).
      Run with: dart test --tags filament
